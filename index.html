<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Agro Cart System</title>

<style>
body {
  font-family: Arial;
  margin:20px;
  background:#f4f4f4;
}

.product {
  border:1px solid #ddd;
  padding:10px;
  width:200px;
  display:inline-block;
  margin:10px;
  background:white;
  border-radius:8px;
}

.product img {
  width:100%;
  height:140px;
  object-fit:cover;
  border-radius:5px;
}

button {
  padding:6px 10px;
  cursor:pointer;
  background:#28a745;
  color:white;
  border:none;
  border-radius:5px;
}

#cartBtn {
  position:fixed;
  bottom:20px;
  right:20px;
  background:orange;
  padding:12px;
  border:none;
  border-radius:50px;
}

#cartModal {
  display:none;
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  padding:20px;
  width:350px;
  border-radius:10px;
  box-shadow:0 0 15px rgba(0,0,0,0.3);
}

input {
  width:100%;
  margin:5px 0;
  padding:6px;
}

.item {
  display:flex;
  justify-content:space-between;
  margin:5px 0;
  border-bottom:1px solid #eee;
  padding-bottom:5px;
}

.deleteBtn {
  background:red;
  padding:3px 6px;
  font-size:12px;
}
</style>
</head>

<body>

<h2>🛒 Agro Products</h2>

<!-- PRODUCTS -->

<div class="product">
  <img src="https://www.halalagro.farm/cdn/shop/collections/Dhundul-halal_agro_farm.jpg?v=1668453150.jpg">
  <h4>ধুন্দুল</h4>
  <p>৳80 / কেজি</p>
  <button onclick="addToCart('ধুন্দুল',80)">Add</button>
</div>

<div class="product">
  <img src="https://obak.com.bd/wp-content/uploads/2024/10/misti-kumra-fali.jpg">
  <h4>মিষ্টি কুমড়া</h4>
  <p>৳115 / কেজি</p>
  <button onclick="addToCart('মিষ্টি কুমড়া',115)">Add</button>
</div>

<div class="product">
  <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQtU5kg4ayq5c0JRvwRH2pQFLor6EMYhK__uQ&s.jpg">
  <h4>ঢেঁড়স</h4>
  <p>৳50 / কেজি</p>
  <button onclick="addToCart('ঢেঁড়স',50)">Add</button>
</div>

<div class="product">
  <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT-UMlCNwgqHHrboLxQ5LJ5cFvPeMEtbvSaiw&s.jpg">
  <h4>করলা</h4>
  <p>৳70 / কেজি</p>
  <button onclick="addToCart('করলা',50)">Add</button>
</div>

<div class="product">
  <img src="https://www.protidinersangbad.com/cache-images/news_photos/2023/08/28/resize-350x300x1x0-image-413434.jpg">
  <h4>লাউ শাক</h4>
  <p>৳30 / আটি</p>
  <button onclick="addToCart('লাউ শাক',50)">Add</button>
</div>

<div class="product">
  <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ2UK3Y3NphvUvbVwb0zAsSE9PUq3N0DF8UTA&s.jpg">
  <h4>কলমি শাক</h4>
  <p>৳70 /  আটি</p>
  <button onclick="addToCart('কলমি শাক',50)">Add</button>
</div>

<!-- CART BUTTON -->

<button id="cartBtn" onclick="openCart()">
Cart (<span id="count">0</span>)
</button>

<!-- CART MODAL -->

<div id="cartModal">
  <h3>Your Cart</h3>
  <div id="items"></div>

  <hr>

  <input placeholder="Customer Name" id="name">
  <input placeholder="Phone" id="phone">
  <input placeholder="Branch Name" id="branch">

  <select id="payment">
    <option value="">Payment Method</option>
    <option>bKash</option>
    <option>Nagad</option>
    <option>Cash on Delivery</option>
  </select>

  <input placeholder="Transaction ID (if paid)" id="trxid">

  <h4>Total: ৳<span id="total">0</span></h4>

  <button onclick="confirmOrder()">Confirm Order</button>
  <button onclick="closeCart()">Close</button>
</div>

<script>

let cart = [];
let total = 0;

function addToCart(name, price){

  let kg = prompt("কত কেজি নিতে চান?");

  if(!kg || isNaN(kg)){
    alert("সঠিক কেজি লিখুন");
    return;
  }

  kg = parseFloat(kg);

  let itemTotal = price * kg;

  cart.push({
    name:name,
    kg:kg,
    total:itemTotal
  });

  total += itemTotal;

  document.getElementById("count").innerText = cart.length;
  renderCart();
}

function renderCart(){

  let html = "";

  cart.forEach((item, index) => {
    html += `
    <div class="item">
      <span>${item.name} (${item.kg}kg) - ৳${item.total}</span>
      <button class="deleteBtn" onclick="removeItem(${index})">X</button>
    </div>
    `;
  });

  document.getElementById("items").innerHTML = html;
  document.getElementById("total").innerText = total;
}

function removeItem(index){
  total -= cart[index].total;
  cart.splice(index,1);

  document.getElementById("count").innerText = cart.length;
  renderCart();
}

function openCart(){
  document.getElementById("cartModal").style.display = "block";
}

function closeCart(){
  document.getElementById("cartModal").style.display = "none";
}

function confirmOrder(){

  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let branch = document.getElementById("branch").value;
  let payment = document.getElementById("payment").value;
  let trxid = document.getElementById("trxid").value;

  if(!name || !phone || !branch || !payment){
    alert("সব তথ্য পূরণ করুন");
    return;
  }

  let orderText = "ORDER SUMMARY\n\n";

  cart.forEach(i => {
    orderText += `${i.name} - ${i.kg}kg - ৳${i.total}\n`;
  });

  orderText += `
Branch: ${branch}
Payment: ${payment}
TrxID: ${trxid}
TOTAL: ৳${total}
`;

  alert(orderText);

  // reset
  cart = [];
  total = 0;

  document.getElementById("items").innerHTML = "";
  document.getElementById("total").innerText = 0;
  document.getElementById("count").innerText = 0;

  closeCart();
}

</script>

</body>
</html>

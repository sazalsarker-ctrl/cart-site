<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cart System</title>

<style>
body {font-family: Arial; margin:20px;}

.product {
  border:1px solid #ddd;
  padding:10px;
  width:200px;
  display:inline-block;
  margin:10px;
}

button {
  padding:5px 10px;
  cursor:pointer;
}

#cartBtn {
  position:fixed;
  bottom:20px;
  right:20px;
  background:orange;
  padding:10px;
  border:none;
}

#cartModal {
  display:none;
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  padding:20px;
  width:300px;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.3);
}

input, select {
  width:100%;
  margin:5px 0;
  padding:5px;
}

</style>
</head>

<body>

<h2>Products</h2>

<div class="product">
  <h4>কুমড়া</h4>
  <p>৳115</p>
  <button onclick="addToCart('কুমড়া',115)">Add</button>
</div>

<div class="product">
  <h4>ঢেঁড়স</h4>
  <p>৳80</p>
  <button onclick="addToCart('ঢেঁড়স',80)">Add</button>
</div>

<button id="cartBtn" onclick="openCart()">Cart (<span id="count">0</span>)</button>

<div id="cartModal">
  <h3>Your Cart</h3>
  <div id="items"></div>

  <hr>

  <input placeholder="Customer Name" id="name">
  <input placeholder="Phone" id="phone">

  <select id="location">
    <option>Dhaka</option>
    <option>Chittagong</option>
  </select>

  <input placeholder="Payment (Bkash/Nagad)" id="payment">

  <p>Bag Charge: ৳10</p>
  <h4>Total: ৳<span id="total">0</span></h4>

  <button onclick="confirmOrder()">Confirm Order</button>
  <button onclick="closeCart()">Close</button>
</div>

<script>

let cart = [];
let total = 0;

function addToCart(name, price){
  cart.push({name, price});
  total += price;

  document.getElementById("count").innerText = cart.length;

  renderCart();
}

function renderCart(){
  let html = "";
  cart.forEach(item => {
    html += item.name + " - ৳" + item.price + "<br>";
  });

  document.getElementById("items").innerHTML = html;
  document.getElementById("total").innerText = total + 10;
}

function openCart(){
  document.getElementById("cartModal").style.display = "block";
}

function closeCart(){
  document.getElementById("cartModal").style.display = "none";
}

function confirmOrder(){
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;

  if(!name || !phone){
    alert("Fill all info");
    return;
  }

  let orderText = "Order:\n";

  cart.forEach(i => {
    orderText += i.name + " - " + i.price + "\n";
  });

  orderText += "Total: " + (total+10);

  alert(orderText);

  // Reset
  cart = [];
  total = 0;
  renderCart();
  document.getElementById("count").innerText = 0;
  closeCart();
}

</script>

</body>
</html>
